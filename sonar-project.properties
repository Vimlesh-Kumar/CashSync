# Core identifiers are supplied in CI via args:
# -Dsonar.projectKey, -Dsonar.organization

sonar.projectName=CashSync
sonar.sourceEncoding=UTF-8

sonar.sources=backend/src,frontend/src
sonar.tests=backend

sonar.test.inclusions=**/*.test.ts,**/*.spec.ts,**/test.ts
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/.expo/**,**/coverage/**,**/*.d.ts,frontend/assets/**,backend/prisma/migrations/**

# JavaScript/TypeScript coverage can be added later when tests are in place.
# sonar.javascript.lcov.reportPaths=coverage/lcov.info
