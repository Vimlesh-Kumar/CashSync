services:
  # The PostgreSQL Database instance
  db:
    image: postgres:15-alpine
    container_name: cashsync-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # In production, we don't expose DB to the host.
    # Use 127.0.0.1:5433:5432 if you MUST access it from your local machine.
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - cashsync_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cashsync-redis
    restart: unless-stopped
    # Internal only
    ports:
      - "127.0.0.1:6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - cashsync_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # The Node.js API (Backend)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cashsync-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
      - PORT=3000
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - ENV_CONTEXT=PRODUCTION
    command: >
      sh -c "npx prisma migrate deploy && npm start"

  # The React Native Web Client (Frontend via Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cashsync-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:8080"

volumes:
  cashsync_pgdata:
  cashsync_redisdata:
