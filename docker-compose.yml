services:
  # The PostgreSQL Database instance
  db:
    image: postgres:15-alpine
    container_name: cashsync-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in your environment or .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your environment or .env}
      POSTGRES_DB: ${POSTGRES_DB:-cashsync}
    ports:
      - "5433:5432"
    volumes:
      - cashsync_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: cashsync-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - cashsync_redisdata:/data

  # The Node.js API (Backend)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cashsync-backend
    restart: unless-stopped
    depends_on:
      - db
      - redis
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-cashsync}?schema=public
      - PORT=3000
      - REDIS_URL=redis://redis:6379
    # Add a health check to wait for DB
    command: >
      sh -c "npx prisma migrate deploy && npm start"

  # The React Native Web Client (Frontend via Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cashsync-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:8080"

volumes:
  cashsync_pgdata:
  cashsync_redisdata:
